server {
    listen 80;
    server_name wabi.darelkubra.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name wabi.darelkubra.com;

    # SSL certificates (adjust paths to your setup)
    ssl_certificate     /etc/letsencrypt/live/wabi.darelkubra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wabi.darelkubra.com/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ─── OWASP Security Headers (required by Zoom Home URL) ───
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https:; frame-ancestors 'self' https://*.zoom.us;" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ─── Reverse proxy to Node.js app ───
    location / {
        proxy_pass http://127.0.0.1:3000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  90s;
        proxy_send_timeout  90s;
    }
}
